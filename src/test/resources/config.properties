# Base API configuration
base.url=https://jsonplaceholder.typicode.com

# Mock server configuration
mock.host=localhost
mock.port=8080
mock.base.url=http://localhost:8080

# Endpoints
endpoint.posts=/posts
endpoint.comments=/comments
endpoint.users=/users
endpoint.albums=/albums
endpoint.photos=/photos
endpoint.todos=/todos

# Mock endpoints
mock.endpoint.users=/api/users
mock.endpoint.posts=/api/posts

# Common content types
content.type.json=application/json

# Common status codes
status.ok=200
status.created=201
status.bad.request=400
status.not.found=404

# Performance thresholds
response.max.time.ms=5000

# Allure configuration
allure.results.directory=target/allure-results
